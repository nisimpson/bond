name: test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Tidy
        run: |
          go fmt ./...
          go mod tidy -v
      - name: No Dirty
        run: git diff --exit-code
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -count=1 -timeout 60s ./...
